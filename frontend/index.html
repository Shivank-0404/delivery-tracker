<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last-Mile Delivery Tracker — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body style="justify-content: center; align-items: center; position: relative;">
  <div class="bg-gradient-deco"></div>
  <div class="bg-gradient-deco-left"></div>

  <div class="glass-panel modal-content" style="max-width: 450px; transform: none; width: 100%;">
    <h1 style="color: var(--color-primary); text-align: center; font-weight: 700; margin-bottom: 10px;">🚚 Delivery Tracker</h1>
    <p style="color: var(--text-secondary); text-center; font-size: 14px; margin-bottom: 20px;" class="text-center">
      Logistics Management & Order Tracking
    </p>

    <div class="tabs-container">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Pane -->
    <div id="login-pane" class="tab-pane active">
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
      </form>
    </div>

    <!-- Register Pane -->
    <div id="register-pane" class="tab-pane">
      <form id="register-form">
        <div class="form-group">
          <label for="register-name">Full Name</label>
          <input type="text" id="register-name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="register-email">Email Address</label>
          <input type="email" id="register-email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" required placeholder="••••••••">
        </div>
        <div class="form-group">
          <label for="register-role">I am a...</label>
          <select id="register-role" required>
            <option value="customer">Customer</option>
            <option value="agent">Delivery Agent</option>
          </select>
        </div>
        <div class="form-group">
          <label for="register-phone">Phone Number</label>
          <input type="tel" id="register-phone" placeholder="+1234567890">
        </div>
        
        <!-- Coordinates for Agents -->
        <div id="coords-fields" style="display: none; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group">
            <label for="register-lat">Latitude</label>
            <input type="number" step="any" id="register-lat" placeholder="28.61">
          </div>
          <div class="form-group">
            <label for="register-lng">Longitude</label>
            <input type="number" step="any" id="register-lng" placeholder="77.20">
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Create Account</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Redirect if logged in
    const user = getUser();
    if (user) {
      if (user.role === 'admin') window.location.href = '/admin/dashboard.html';
      else if (user.role === 'customer') window.location.href = '/customer/dashboard.html';
      else if (user.role === 'agent') window.location.href = '/agent/dashboard.html';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
      
      if (tab === 'login') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('login-pane').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('register-pane').classList.add('active');
      }
    }

    // Toggle coords for agents
    document.getElementById('register-role').addEventListener('change', (e) => {
      const coords = document.getElementById('coords-fields');
      if (e.target.value === 'agent') {
        coords.style.display = 'grid';
        // Prefill default lat/lng
        document.getElementById('register-lat').value = 28.6139;
        document.getElementById('register-lng').value = 77.2090;
      } else {
        coords.style.display = 'none';
      }
    });

    // Form Submissions
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        const res = await apiFetch('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        
        localStorage.setItem('dt_token', res.token);
        localStorage.setItem('dt_user', JSON.stringify(res.user));
        showToast('Login successful!');
        
        setTimeout(() => {
          if (res.user.role === 'admin') window.location.href = '/admin/dashboard.html';
          else if (res.user.role === 'customer') window.location.href = '/customer/dashboard.html';
          else window.location.href = '/agent/dashboard.html';
        }, 800);
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const role = document.getElementById('register-role').value;
      const phone = document.getElementById('register-phone').value;
      const lat = document.getElementById('register-lat').value;
      const lng = document.getElementById('register-lng').value;

      try {
        const payload = { name, email, password, role, phone };
        if (role === 'agent') {
          payload.lat = parseFloat(lat);
          payload.lng = parseFloat(lng);
        }

        const res = await apiFetch('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        localStorage.setItem('dt_token', res.token);
        localStorage.setItem('dt_user', JSON.stringify(res.user));
        showToast('Registration successful!');

        setTimeout(() => {
          if (res.user.role === 'customer') window.location.href = '/customer/dashboard.html';
          else window.location.href = '/agent/dashboard.html';
        }, 800);
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
