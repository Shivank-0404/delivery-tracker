<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Order — Delivery Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-gradient-deco"></div>
  <div class="bg-gradient-deco-left"></div>

  <!-- Navigation -->
  <nav class="navbar glass-panel container">
    <a href="#" class="brand">🚚 Last-Mile Delivery Tracker</a>
    <ul class="nav-links">
      <li><a href="/customer/dashboard.html">Dashboard</a></li>
      <li><a href="/customer/place-order.html" class="active">Place Order</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>

  <div class="container" style="max-width: 800px;">
    <h2 style="margin-bottom: 20px;">Place a Shipment</h2>

    <div class="grid-2">
      <!-- Order Creation Form -->
      <div class="glass-panel card">
        <form id="order-form">
          <div class="form-group">
            <label for="pickup-address">Pickup Address</label>
            <input type="text" id="pickup-address" required placeholder="e.g. 110001 Connaught Place, New Delhi">
          </div>
          <div class="form-group">
            <label for="drop-address">Drop Address</label>
            <input type="text" id="drop-address" required placeholder="e.g. Andheri East, Mumbai">
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
              <label for="order-type">Order Type</label>
              <select id="order-type" required>
                <option value="B2C">B2C (Retail)</option>
                <option value="B2B">B2B (Business)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="payment-type">Payment Type</label>
              <select id="payment-type" required>
                <option value="Prepaid">Prepaid</option>
                <option value="COD">Cash on Delivery (COD)</option>
              </select>
            </div>
          </div>

          <h4 style="margin: 15px 0 10px 0; color: var(--color-primary);">Package Details</h4>

          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            <div class="form-group">
              <label for="length">Length (cm)</label>
              <input type="number" id="length" min="1" required placeholder="L">
            </div>
            <div class="form-group">
              <label for="breadth">Breadth (cm)</label>
              <input type="number" id="breadth" min="1" required placeholder="B">
            </div>
            <div class="form-group">
              <label for="height">Height (cm)</label>
              <input type="number" id="height" min="1" required placeholder="H">
            </div>
          </div>

          <div class="form-group">
            <label for="actual-weight">Actual Weight (kg)</label>
            <input type="number" step="0.1" id="actual-weight" min="0.1" required placeholder="e.g. 2.5">
          </div>

          <div class="flex-between margin-top-20">
            <button type="button" class="btn btn-secondary" onclick="previewCharges()">Estimate Charge</button>
            <button type="submit" class="btn btn-primary">Book Shipment</button>
          </div>
        </form>
      </div>

      <!-- Pricing Summary Sheet -->
      <div class="glass-panel card" id="pricing-summary" style="display: none; height: fit-content; position: sticky; top: 110px;">
        <h3 style="margin-bottom: 20px; border-bottom: 1px solid var(--border-glass); padding-bottom: 10px; color: var(--color-primary);">
          Estimated Invoice
        </h3>
        <div style="display: flex; flex-direction: column; gap: 15px;">
          <div class="flex-between">
            <span>Volumetric Weight:</span>
            <span id="sum-volumetric" style="font-weight: 600;">0.0 kg</span>
          </div>
          <div class="flex-between">
            <span>Billed Weight (Max):</span>
            <span id="sum-billed" style="font-weight: 600;">0.0 kg</span>
          </div>
          <div class="flex-between">
            <span>Delivery Charge:</span>
            <span id="sum-delivery" style="font-weight: 600;">$0.00</span>
          </div>
          <div class="flex-between">
            <span>COD Surcharge:</span>
            <span id="sum-cod" style="font-weight: 600;">$0.00</span>
          </div>
          <hr style="border: 0; border-top: 1px solid var(--border-glass);">
          <div class="flex-between" style="font-size: 18px; font-weight: 700;">
            <span style="color: var(--color-primary);">Total Charges:</span>
            <span id="sum-total" style="color: var(--color-success);">$0.00</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    requireAuth('customer');

    async function getPayload() {
      return {
        pickupAddress: document.getElementById('pickup-address').value,
        dropAddress: document.getElementById('drop-address').value,
        orderType: document.getElementById('order-type').value,
        paymentType: document.getElementById('payment-type').value,
        length: parseFloat(document.getElementById('length').value),
        breadth: parseFloat(document.getElementById('breadth').value),
        height: parseFloat(document.getElementById('height').value),
        actualWeight: parseFloat(document.getElementById('actual-weight').value)
      };
    }

    async function previewCharges() {
      try {
        const payload = await getPayload();
        
        // Basic validation
        if (!payload.pickupAddress || !payload.dropAddress || isNaN(payload.length) || isNaN(payload.actualWeight)) {
          showToast('Please fill out all address and package dimensions to calculate.', 'error');
          return;
        }

        const data = await apiFetch('/api/orders/calculate-charge', {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        // Populate summary sheet
        document.getElementById('sum-volumetric').innerText = `${data.volumetricWeight.toFixed(3)} kg`;
        document.getElementById('sum-billed').innerText = `${data.billedWeight.toFixed(3)} kg`;
        document.getElementById('sum-delivery').innerText = `$${data.deliveryCharge.toFixed(2)}`;
        document.getElementById('sum-cod').innerText = `$${data.codSurcharge.toFixed(2)}`;
        document.getElementById('sum-total').innerText = `$${data.totalCharge.toFixed(2)}`;
        
        document.getElementById('pricing-summary').style.display = 'block';
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    document.getElementById('order-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const payload = await getPayload();
        
        const order = await apiFetch('/api/orders', {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        showToast('Shipment booked successfully!', 'success');
        
        setTimeout(() => {
          window.location.href = `/customer/track.html?id=${order.id}`;
        }, 1200);
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
