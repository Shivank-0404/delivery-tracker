<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agents Matrix — Delivery Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-gradient-deco"></div>
  <div class="bg-gradient-deco-left"></div>

  <!-- Navigation -->
  <nav class="navbar glass-panel container">
    <a href="#" class="brand">🚚 Last-Mile Delivery Tracker <span style="font-size: 12px; font-weight: normal; color: var(--color-accent);">[Admin Portal]</span></a>
    <ul class="nav-links">
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>

  <div class="container admin-layout">
    <!-- Sidebar -->
    <div class="glass-panel sidebar">
      <a href="/admin/dashboard.html">Overview</a>
      <a href="/admin/zones.html">Manage Zones</a>
      <a href="/admin/rate-cards.html">Rate Cards</a>
      <a href="/admin/orders.html">Orders Queue</a>
      <a href="/admin/agents.html" class="active">Agents Matrix</a>
    </div>

    <!-- Main Content Panel -->
    <div class="main-content">
      <h2>Delivery Agent Directory</h2>
      <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 15px;">Monitor active agent availability and zone parameters.</p>

      <div class="glass-panel card">
        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr>
                <th>Agent Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Assigned Zone</th>
                <th>Coordinates</th>
                <th>Duty Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="agents-tbody">
              <tr>
                <td colspan="7" class="text-center" style="padding: 30px;">Loading agent network...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    requireAuth('admin');

    async function loadAgents() {
      try {
        const agents = await apiFetch('/api/agents');
        renderAgents(agents);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function renderAgents(agents) {
      const tbody = document.getElementById('agents-tbody');
      if (agents.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center">No delivery agents are currently registered.</td></tr>`;
        return;
      }

      tbody.innerHTML = agents.map(agent => {
        const statusLabel = agent.is_available 
          ? `<span class="badge badge-delivered">Available</span>` 
          : `<span class="badge badge-failed">Busy</span>`;

        const actionBtn = agent.is_available
          ? `<button class="btn btn-secondary btn-sm" onclick="toggleDuty('${agent.id}', false)">Set Busy</button>`
          : `<button class="btn btn-success btn-sm" onclick="toggleDuty('${agent.id}', true)">Set Available</button>`;

        const coords = (agent.lat && agent.lng)
          ? `<code style="font-size: 12px;">${agent.lat.toFixed(4)}, ${agent.lng.toFixed(4)}</code>`
          : `<span style="color: var(--text-secondary);">No GPS</span>`;

        return `
          <tr>
            <td><strong>${agent.name}</strong></td>
            <td>${agent.email}</td>
            <td>${agent.phone || 'N/A'}</td>
            <td>${agent.zone ? agent.zone.name : '<span style="color: var(--text-secondary);">Global</span>'}</td>
            <td>${coords}</td>
            <td>${statusLabel}</td>
            <td>${actionBtn}</td>
          </tr>
        `;
      }).join('');
    }

    async function toggleDuty(agentId, setAvailable) {
      try {
        await apiFetch(`/api/agents/${agentId}/availability`, {
          method: 'PUT',
          body: JSON.stringify({ is_available: setAvailable })
        });
        showToast(`Agent duty status updated.`);
        loadAgents();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    loadAgents();
  </script>
</body>
</html>
